<div class="flex-1 overflow-y-auto bg-slate-50 p-4 md:p-8 h-full">
  <div class="max-w-5xl mx-auto">
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-slate-900 mb-2">Mi Equipo</h2>
      <p class="text-slate-500">Administra los miembros de tu estudio y sus accesos.</p>
    </div>

    <div class="grid md:grid-cols-3 gap-8">
      <!-- Team Stats & Invite -->
      <div class="md:col-span-1 space-y-6">
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center">
              <i class="fas fa-users text-lg"></i>
            </div>
            <div>
              <h3 class="font-bold text-slate-900">Uso del Plan</h3>
              <p class="text-sm text-slate-500">{{ members.length }} de 10 asientos</p>
            </div>
          </div>
          <div class="w-full bg-slate-100 rounded-full h-2 mb-2 overflow-hidden">
            <div class="bg-indigo-600 h-2 rounded-full" [style.width.%]="(members.length / 10) * 100"></div>
          </div>
        </div>

        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
          <h3 class="font-bold text-slate-900 mb-4 flex items-center gap-2">
            <i class="fas fa-user-plus text-slate-400"></i> Invitar Miembro
          </h3>
          <form (ngSubmit)="handleInvite()" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Correo electrónico</label>
              <input 
                type="email" 
                required
                [(ngModel)]="inviteEmail"
                name="email"
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm" 
                placeholder="abogado@estudio.com" 
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Rol asignado</label>
              <select class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm bg-white">
                <option>Miembro</option>
                <option>Admin</option>
              </select>
            </div>
            <button type="submit" class="w-full py-2.5 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors shadow-sm">
              Enviar invitación
            </button>
          </form>
        </div>
      </div>

      <!-- Team List -->
      <div class="md:col-span-2">
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden overflow-x-auto">
          <table class="w-full text-left min-w-[500px]">
            <thead>
              <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                <th class="px-6 py-4 font-medium">Usuario</th>
                <th class="px-6 py-4 font-medium">Rol</th>
                <th class="px-6 py-4 font-medium">Docs Generados</th>
                <th class="px-6 py-4 font-medium text-right"></th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
              <tr *ngFor="let member of members" class="hover:bg-slate-50/50">
                <td class="px-6 py-4">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-bold text-slate-500">
                      <i *ngIf="member.pending" class="fas fa-envelope"></i>
                      <span *ngIf="!member.pending">{{ member.name.charAt(0).toUpperCase() }}</span>
                    </div>
                    <div>
                      <p [class]="'font-medium ' + (member.pending ? 'text-slate-500 italic' : 'text-slate-900')">
                        {{ member.name }} <span *ngIf="member.pending">(Pendiente)</span>
                      </p>
                      <p class="text-xs text-slate-500">{{ member.email }}</p>
                    </div>
                  </div>
                </td>
                <td class="px-6 py-4">
                  <span [class]="'inline-flex items-center gap-1 px-2.5 py-1 rounded-md text-xs font-medium ' + (member.role === 'Admin' ? 'bg-indigo-50 text-indigo-700' : 'bg-slate-100 text-slate-700')">
                    <i *ngIf="member.role === 'Admin'" class="fas fa-shield-alt text-[10px]"></i>
                    {{ member.role }}
                  </span>
                </td>
                <td class="px-6 py-4 text-sm text-slate-600">
                  {{ member.docs }}
                </td>
                <td class="px-6 py-4 text-right">
                  <button class="p-2 text-slate-400 hover:text-slate-600 rounded-lg hover:bg-slate-100 transition-colors">
                    <i class="fas fa-ellipsis-h"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
