<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-900 via-purple-900 to-black text-white">
  <div class="max-w-md w-full bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-2xl border border-white/20">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold tracking-tight text-white">Nueva Contraseña</h2>
      <p class="text-indigo-200 mt-2">Crea una nueva contraseña para tu cuenta</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      
      <app-form-input
        label="Nueva Contraseña"
        type="password"
        placeholder="••••••••"
        [(ngModel)]="newPassword"
        name="newPassword"
        [required]="true">
        <i prefix class="fas fa-lock text-indigo-400"></i>
      </app-form-input>

      <button type="submit"
        [disabled]="loading || !token"
        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
        {{ loading ? 'Guardando...' : 'Restablecer Contraseña' }}
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-indigo-200">
        <a routerLink="/login" class="font-medium text-indigo-400 hover:text-indigo-300 transition-colors">
          Cancelar y volver al login
        </a>
      </p>
    </div>
  </div>
</div>
