<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-900 via-purple-900 to-black dark:from-slate-900 dark:via-slate-900 dark:to-slate-950 text-white">
  <div class="max-w-md w-full bg-white/10 dark:bg-slate-800/50 backdrop-blur-lg p-8 rounded-2xl shadow-2xl border border-white/20 dark:border-slate-700">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold tracking-tight text-white dark:text-gray-100">Crea tu cuenta</h2>
      <p class="text-indigo-200 dark:text-slate-400 mt-2">Únete a LexIA hoy</p>
    </div>

    <!-- Google Button Container -->
    <div class="w-full flex justify-center mb-6" id="google-btn-register"></div>

    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-indigo-500/30 dark:border-slate-700"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-2 text-indigo-300 dark:text-slate-400 bg-transparent font-medium" style="background-color: rgba(30, 27, 75, 0.8); border-radius: 4px;">o regístrate con correo</span>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">

      <app-form-input
        label="Nombre Completo"
        type="text"
        placeholder="Juan Pérez"
        [(ngModel)]="name"
        name="name"
        [required]="true">
        <i prefix class="fas fa-user text-indigo-400"></i>
      </app-form-input>

      <app-form-input
        label="Correo Electrónico"
        type="email"
        placeholder="tu@email.com"
        [(ngModel)]="email"
        name="email"
        [required]="true">
        <i prefix class="fas fa-envelope text-indigo-400"></i>
      </app-form-input>

      <app-form-input
        label="Contraseña"
        type="password"
        placeholder="••••••••"
        [(ngModel)]="password"
        name="password"
        [required]="true">
        <i prefix class="fas fa-lock text-indigo-400"></i>
      </app-form-input>

      <button type="submit"
        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
        Registrarse
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-indigo-200">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="font-medium text-indigo-400 hover:text-indigo-300 transition-colors">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>
